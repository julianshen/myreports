<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Julian's Dashboard</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --card-hover: #334155;
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --accent2: #818cf8;
            --up: #34d399;
            --down: #fb7185;
            --warning: #fbbf24;
            --danger: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 480px; margin: 0 auto; padding: 16px; }
        header {
            text-align: center;
            padding: 24px 0 16px;
            border-bottom: 1px solid var(--card);
            margin-bottom: 16px;
        }
        header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px; }
        header p { color: var(--text-secondary); font-size: 0.875rem; margin-top: 4px; }
        .nav-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }
        .nav-card {
            background: var(--card);
            border-radius: 16px;
            padding: 20px 16px;
            text-align: center;
            text-decoration: none;
            color: var(--text);
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .nav-card:hover, .nav-card:active {
            background: var(--card-hover);
            border-color: var(--accent);
            transform: translateY(-2px);
        }
        .nav-card .icon {
            font-size: 2rem;
            margin-bottom: 8px;
            display: block;
        }
        .nav-card .label { font-size: 0.9rem; font-weight: 600; }
        .nav-card .sub { font-size: 0.75rem; color: var(--text-secondary); margin-top: 2px; }
        .section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin: 24px 0 12px;
            padding-left: 4px;
        }
        .link-list {
            background: var(--card);
            border-radius: 16px;
            overflow: hidden;
        }
        .link-item {
            display: flex;
            align-items: center;
            padding: 16px;
            text-decoration: none;
            color: var(--text);
            border-bottom: 1px solid var(--bg);
            transition: background 0.15s;
        }
        .link-item:last-child { border-bottom: none; }
        .link-item:hover, .link-item:active { background: var(--card-hover); }
        .link-item .icon { font-size: 1.25rem; margin-right: 12px; width: 24px; text-align: center; }
        .link-item .text { flex: 1; }
        .link-item .title { font-weight: 600; font-size: 0.95rem; }
        .link-item .desc { font-size: 0.8rem; color: var(--text-secondary); margin-top: 2px; }
        .link-item .arrow { color: var(--text-secondary); font-size: 1.2rem; }
        footer {
            text-align: center;
            padding: 32px 16px;
            color: var(--text-secondary);
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Julian's Dashboard</h1>
            <p>個人財經與生活儀表板</p>
        </header>

        <div class="nav-grid">
            <a href="reports/premarket/latest.html" class="nav-card">
                <span class="icon">🌅</span>
                <div class="label">盤前分析</div>
                <div class="sub">美股 + 台股</div>
            </a>
            <a href="reports/intraday/latest.html" class="nav-card">
                <span class="icon">📈</span>
                <div class="label">盤中監控</div>
                <div class="sub">每 15 分鐘</div>
            </a>
        </div>

        <div class="section-title">歷史報告</div>
        <div class="link-list">
            <a href="reports/premarket/" class="link-item">
                <span class="icon">📋</span>
                <div class="text">
                    <div class="title">盤前分析歷史</div>
                    <div class="desc">查看過去每日盤前報告</div>
                </div>
                <span class="arrow">›</span>
            </a>
            <a href="reports/intraday/" class="link-item">
                <span class="icon">⏱️</span>
                <div class="text">
                    <div class="title">盤中監控歷史</div>
                    <div class="desc">查看盤中即時監控記錄</div>
                </div>
                <span class="arrow">›</span>
            </a>
        </div>

        <footer>
            <p>© 2026 Julian Shen · 資料僅供參考，非投資建議</p>
        </footer>
    </div>
</body>
</html>
