<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>台股盤中 - {{DATE}}</title>
    <style>
        :root {
            --bg: #0a0e1a;
            --card: #141b2d;
            --text: #e2e8f0;
            --text-secondary: #8892a0;
            --accent: #f472b6;
            --up: #4ade80;
            --down: #f87171;
            --warning: #fbbf24;
            --danger: #ef4444;
            --border: #1e293b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
                .container { 
            max-width: 480px; 
            margin: 0 auto; 
            padding: clamp(12px, 3vw, 20px); 
            padding-bottom: 90px; 
        }
        
        /* Responsive font sizes */
        @media (max-width: 360px) {
            html { font-size: 14px; }
        }
        @media (min-width: 361px) and (max-width: 430px) {
            html { font-size: 15px; }
        }
        @media (min-width: 431px) {
            html { font-size: 16px; }
        }
        
        /* Tablet and desktop */
        @media (min-width: 768px) {
            .container { 
                max-width: 640px; 
                padding: 24px;
                padding-bottom: 100px;
            }
            .stock-metrics {
                grid-template-columns: repeat(4, 1fr);
            }
            .index-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
        .back-btn {
            display: inline-flex; align-items: center; gap: 6px;
            color: var(--accent); text-decoration: none; font-size: 0.9rem;
            margin-bottom: 12px; padding: 8px 0;
        }
        header { padding: 8px 0 16px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
        header h1 { font-size: 1.4rem; font-weight: 700; }
        header .meta { color: var(--text-secondary); font-size: 0.8rem; margin-top: 4px; }
        .market-badge {
            display: inline-block; padding: 3px 10px; border-radius: 20px;
            font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
            background: rgba(244,114,182,0.15); color: var(--accent);
            margin-bottom: 12px;
        }
        .section {
            background: var(--card); 
            border-radius: clamp(12px, 3vw, 16px); 
            padding: clamp(12px, 3vw, 16px);
            margin-bottom: clamp(10px, 2.5vw, 12px); 
            border: 1px solid var(--border);
        }
        .section-title {
            font-size: clamp(0.75rem, 2vw, 0.85rem); 
            text-transform: uppercase; 
            letter-spacing: 1px;
            color: var(--accent); 
            margin-bottom: clamp(10px, 2.5vw, 12px);
            display: flex; 
            align-items: center; 
            gap: 6px;
        }
        .alert-card {
            background: var(--bg); border-radius: 14px; padding: 16px;
            margin-bottom: 12px; border: 1px solid var(--border);
            border-left: 4px solid var(--accent);
        }
        .alert-card:last-child { margin-bottom: 0; }
        .alert-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 8px;
        }
        .alert-symbol { font-weight: 700; font-size: 1.1rem; }
        .alert-badge {
            padding: 2px 8px; border-radius: 12px; font-size: 0.7rem; font-weight: 700;
        }
        .alert-badge-spike { background: rgba(239,68,68,0.15); color: var(--danger); }
        .alert-badge-volume { background: rgba(251,191,36,0.15); color: var(--warning); }
        .alert-badge-index { background: rgba(244,114,182,0.15); color: var(--accent); }
        .alert-detail { font-size: 0.85rem; color: var(--text-secondary); }
        .alert-time { font-size: 0.75rem; color: var(--text-secondary); margin-top: 6px; }
        .index-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .index-card {
            background: var(--bg); border-radius: 12px; padding: 12px; text-align: center;
            border: 1px solid var(--border);
        }
        .index-card .name { font-size: 0.75rem; color: var(--text-secondary); }
        .index-card .price { font-size: 1.1rem; font-weight: 700; margin: 4px 0; }
        .index-card .change { font-size: 0.8rem; font-weight: 600; }
        .up { color: var(--up); }
        .down { color: var(--down); }
        .no-alert {
            text-align: center; padding: 40px 20px; color: var(--text-secondary);
        }
        .no-alert .icon { font-size: 3rem; margin-bottom: 12px; }
        .no-alert .text { font-size: 0.9rem; }
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--card); border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; padding: 10px 0;
            max-width: 480px; margin: 0 auto;
            z-index: 100;
        }
        .bottom-nav a {
            color: var(--text-secondary); text-decoration: none;
            font-size: 0.7rem; text-align: center; padding: 4px 8px;
        }
        .bottom-nav a.active { color: var(--accent); }
        .bottom-nav .nav-icon { font-size: 1.2rem; display: block; margin-bottom: 2px; }
        footer { text-align: center; padding: 24px 16px; color: var(--text-secondary); font-size: 0.7rem; }
    </style>
</head>
<body>
    <div class="container">
        <a href="../../index.html" class="back-btn">← 返回儀表板</a>
        <div class="market-badge">🌸 TW Market</div>
        <header>
            <h1>📈 台股盤中監控</h1>
            <div class="meta">{{DATE}} · 台北時間 {{TIME}} 更新</div>
        </header>

        <!-- 即時指數 -->
        <div class="section">
            <div class="section-title">📊 即時指數</div>
            <div class="index-grid">
                <div class="index-card">
                    <div class="name">加權指數</div>
                    <div class="price">{{TAIEX_PRICE}}</div>
                    <div class="change {{TAIEX_CHANGE_CLASS}}">{{TAIEX_CHANGE}}</div>
                </div>
                <div class="index-card">
                    <div class="name">櫃買指數</div>
                    <div class="price">{{OTC_PRICE}}</div>
                    <div class="change {{OTC_CHANGE_CLASS}}">{{OTC_CHANGE}}</div>
                </div>
                <div class="index-card">
                    <div class="name">電子類指數</div>
                    <div class="price">{{ELEC_PRICE}}</div>
                    <div class="change {{ELEC_CHANGE_CLASS}}">{{ELEC_CHANGE}}</div>
                </div>
                <div class="index-card">
                    <div class="name">金融類指數</div>
                    <div class="price">{{FIN_PRICE}}</div>
                    <div class="change {{FIN_CHANGE_CLASS}}">{{FIN_CHANGE}}</div>
                </div>
            </div>
        </div>

        <!-- 警報區 -->
        <div class="section">
            <div class="section-title">🚨 智慧警報</div>
            {{ALERTS}}
        </div>

        <footer><p>資料僅供參考，非投資建議</p></footer>
    </div>

    <div class="bottom-nav">
        <a href="../../index.html"><span class="nav-icon">🏠</span>首頁</a>
        <a href="../premarket/latest.html"><span class="nav-icon">🌅</span>盤前</a>
        <a href="latest.html" class="active"><span class="nav-icon">📈</span>盤中</a>
        <a href="../postmarket/latest.html"><span class="nav-icon">🌙</span>盤後</a>
    </div>
</body>
</html>
