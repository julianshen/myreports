<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'none'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; frame-src 'none';">

    <title>美股盤中 - {{DATE}}</title>
        <link rel="stylesheet" href="../../../assets/report.css">
    <style>
        :root {
            --accent: #60a5fa;
            --accent2: #a78bfa;
        }
        .market-badge { background: rgba(96,165,250,0.15); }
        .news-link { background: rgba(96,165,250,0.12); }
        .signal-value { background: rgba(96,165,250,0.15); }
    </style>
</head>
<body>
    <div class="container">
        <a href="../../index.html" class="back-btn">← 返回儀表板</a>
        <div class="market-badge">🇺🇸 US Market</div>
        <header>
            <h1>📈 美股盤中監控</h1>
            <div class="meta">{{DATE}} · 美東時間 {{TIME}} 更新</div>
        </header>

        <!-- 即時指數 -->
        <div class="section">
            <div class="section-title">📊 即時指數</div>
            <div class="index-grid">
                <div class="index-card">
                    <div class="name">S&P 500</div>
                    <div class="price">{{SPX_PRICE}}</div>
                    <div class="change {{SPX_CHANGE_CLASS}}">{{SPX_CHANGE}}</div>
                </div>
                <div class="index-card">
                    <div class="name">NASDAQ</div>
                    <div class="price">{{NDX_PRICE}}</div>
                    <div class="change {{NDX_CHANGE_CLASS}}">{{NDX_CHANGE}}</div>
                </div>
                <div class="index-card">
                    <div class="name">Dow</div>
                    <div class="price">{{DJI_PRICE}}</div>
                    <div class="change {{DJI_CHANGE_CLASS}}">{{DJI_CHANGE}}</div>
                </div>
                <div class="index-card">
                    <div class="name">VIX</div>
                    <div class="price">{{VIX_PRICE}}</div>
                    <div class="change {{VIX_CHANGE_CLASS}}">{{VIX_CHANGE}}</div>
                </div>
            </div>
        </div>

        <!-- 警報區 -->
        <div class="section">
            <div class="section-title">🚨 智慧警報</div>
            {{ALERTS}}
        </div>

        <footer><p>資料僅供參考，非投資建議</p></footer>
    </div>

    <div class="bottom-nav">
        <a href="../../index.html"><span class="nav-icon">🏠</span>首頁</a>
        <a href="../premarket/latest.html"><span class="nav-icon">🌅</span>盤前</a>
        <a href="latest.html" class="active"><span class="nav-icon">📈</span>盤中</a>
        <a href="../postmarket/latest.html"><span class="nav-icon">🌙</span>盤後</a>
    </div>
</body>
</html>
